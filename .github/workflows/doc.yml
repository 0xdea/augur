name: doc

permissions:
  contents: read

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # needed to push generated rustdoc to the gh-pages branch
    steps:
      - name: checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        # zizmor: ignore[artipacked] -- persisted credentials are needed to push generated docs to gh-pages below
      - name: generate documentation
        run: cargo doc
      - name: git configuration
        run: |
          git config user.name "GitHub Actions for augur"
          git config user.email "raptor@0xdeadbeef.info"
          git config push.autosetupremote true
      - name: deploy
        run: |
          git fetch --all
          git checkout gh-pages
          cp -R target/doc/* .
          rm -rf target Cargo.lock
          git add .
          git config push.autosetupremote true
          git commit -m 'update documentation'
          git push
